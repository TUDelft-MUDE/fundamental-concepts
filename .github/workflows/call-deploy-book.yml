name: call-deploy-book

on:
  push:
    branches:
    - '**'
    paths:
    - book/**
    - requirements.txt
  workflow_dispatch:

jobs: 
  call-workflow:
    uses: TeachBooks/deploy-book-workflow/.github/workflows/deploy-book.yml@main
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

