title: MUDE Fundamental Concept
author: MUDE Teachers and the Student Army from Delft University of Technology, built with <a href="https://teachbooks.tudelft.nl/">TeachBooks</a> and <a href="https://jupyterbook.org/">Jupyter Book</a>, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="license noopener noreferrer"">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt=""><img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt=""></a>
logo: https://github.com/TUDelft-MUDE/source-files/raw/main/file/MUDE_Logo-small.png

execute:
  execute_notebooks: "off"

only_build_toc_files: true

html:
  baseurl :  "https://mude.citg.tudelft.nl/fundamental-concepts/2025/"
  use_multitoc_numbering: false

sphinx:
  config:
    patch_config:
      disabled-patches: []
    html_show_copyright: false
    html_last_updated_fmt: '%B %-d, %Y'
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
    thebe_config:
      use_thebe_lite: true
      exclude_patterns: ["**/*.JPG", "**/*.PNG", "**/*.bib", "**/*.cpg", "**/*.csv", "**/*.dbf", "**/*.geojson", "**/*.gif", "**/*.html", "**/*.ico", "**/*.ipynb", "**/*.jl", "**/*.jpeg", "**/*.jpg", "**/*.json", "**/*.md", "**/*.npy", "**/*.pdf", "**/*.png", "**/*.prj", "**/*.sbn", "**/*.sbx", "**/*.shp", "**/*.shx", "**/*.svg", "**/*.tif", "**/*.tiff", "**/*.txt", "**/*.webp", "**/*.whl", "**/*.xlsx", "**/*.xml", "**/*.yml", "**/*.zip"]
    html_theme_options:
      logo:
        text: Fundamental Concepts
        link: "https://mude.citg.tudelft.nl/"
      repository_url: "https://github.com/TUDelft-MUDE/fundamental-concepts"
      path_to_docs: "book"
      repository_branch: "2025"
      use_edit_page_button: true
      use_repository_button: true
      use_issues_button : true
      launch_buttons:
        thebe: true      
    bibtex_default_style: myapastyle
    bibtex_reference_style: author_year_round
    tud_change_logo: false
    named_colors_custom_colors: {'attributiongrey':[150,150,150]}
  local_extensions:
    apastyle: _ext/
    bracket_citation_style: _ext/
  extra_extensions:
    - sphinx_inline_tabs
    - sphinx.ext.imgconverter
    - download_link_replacer
    - jupyterbook_patches
    - sphinx.ext.extlinks
    - sphinx_image_inverter
    - sphinx_tudelft_theme
    - sphinx_named_colors
    - teachbooks_sphinx_tippy
    - sphinx_dropdown_toggle
    - sphinx_iframes
    - sphinx_accessibility

bibtex_bibfiles:
  - _bibliography/references.bib

teachbooks:
  attribution_color: attributiongrey
